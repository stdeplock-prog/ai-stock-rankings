<!DOCTYPE html>
<html lfang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Stock Rankings</title>
    <style>
        :root {
            --bg: #0b1220;
            --panel: #111827;
            --panel2: #172033;
            --line: #243043;
            --text: #e5eefc;
            --muted: #93a4bd;
            --pill: #1f2937;
            --pill-high: #065f46;
            --pill-med: #854d0e;
            --pill-low: #4b5563;
            --star: #fbbf24
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: var(--bg);
            color: var(--text)
        }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--panel2);
            border-bottom: 1px solid var(--line);
            padding: 12px 16px
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .btn,
        select,
        input {
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--line);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer
        }

        main {
            padding: 16px
        }

        .kpis {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin: 12px 0
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px
        }

        .label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em
        }

        .value {
            font-size: 22px;
            font-weight: 700;
            margin-top: 6px
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 8px
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1150px
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid var(--line);
            text-align: left
        }

        th {
            position: sticky;
            top: 0;
            background: var(--panel2);
            font-size: 12px;
            letter-spacing: .05em;
            text-transform: uppercase;
            cursor: pointer
        }

        tr:hover {
            background: rgba(255, 255, 255, .03)
        }

        tr.favorited {
            background: rgba(251, 191, 36, .08);
            border-left: 3px solid var(--star)
        }

        .pill {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13px
        }

        .pill-high {
            background: var(--pill-high);
            color: #d1fae5
        }

        .pill-med {
            background: var(--pill-med);
            color: #fef3c7
        }

        .pill-low {
            background: var(--pill-low);
            color: #e5e7eb
        }

        .star-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            font-size: 18px;
            line-height: 1;
            color: var(--muted);
            transition: color .2s
        }

        .star-btn:hover {
            color: var(--star)
        }

        .star-btn.active {
            color: var(--star)
        }

        .err {
            color: #f87171;
            padding: 12px;
            font-size: 14px
        }

        .chg-up {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            color: #22c55e;
            font-weight: 700;
            font-size: 13px
        }

        .chg-down {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            color: #f87171;
            font-weight: 700;
            font-size: 13px
        }

        .chg-flat {
            color: var(--muted);
            font-size: 13px
        }

        .chg-up svg,
        .chg-down svg {
            flex-shrink: 0
        }

        .next-run {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px
        }

        .tasks-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            margin: 16px 0
        }

        .tasks-wrap table {
            min-width: 700px
        }

        @media(max-width:960px) {
            .kpis {
                grid-template-columns: repeat(2, minmax(0, 1fr))
            }
        }

        @media(max-width:640px) {
            .kpis {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="row">
            <div class="label">Live rankings dashboard</div>
            <div style="font-size:22px;font-weight:700">AI Stock Rankings</div>
            <div id="updated" class="label" style="margin-top:4px">Last Updated: â€”</div>
            <div id="nextRun" class="next-run">Next run: â€”</div>
        </div>
        <div class="controls">
            <select id="universe">
                <option value="top-popular">Top Popular</option>
                <option value="top-growth">Top Growth</option>
                <option value="top-low-risk">Top Low Risk</option>
                <option value="top-sp500">Top S&P 500</option>
            </select>
            <select id="sectorFilter">
                <option value="">All Sectors</option>
            </select>
            <input id="search" placeholder="Search ticker or company">
            <button class="btn" id="favFilterBtn">Show Watchlist (0)</button>
            <button class="btn" id="refreshBtn">Refresh</button>
            <button class="btn" id="exportBtn">Export CSV</button>
        </div>
    </header>
    <main>
        <div class="kpis">
            <div class="card">
                <div class="label">Rows</div>
                <div class="value" id="kpiRows">0</div>
            </div>
            <div class="card">
                <div class="label">AI 9-10</div>
                <div class="value" id="kpiTop">0</div>
            </div>
            <div class="card">
                <div class="label">Avg Technical</div>
                <div class="value" id="kpiTech">0.00</div>
            </div>
            <div class="card">
                <div class="label">Watchlist</div>
                <div class="value" id="kpiFavs">0</div>
            </div>
        </div>
        <div class="row" style="margin-bottom:6px;margin-top:8px">
            <div class="label">Scheduled Tasks</div>
        </div>
        <div class="tasks-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:40px">#</th>
                        <th>Task</th>
                        <th>Schedule</th>
                        <th>Last Run</th>
                        <th>Next Run</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tasksTbody"></tbody>
            </table>
        </div>
        <section class="kpis" style="margin-top:0"></section>
        <div id="errMsg" class="err"></div>
        <div class="table-wrap">
            <table>
                <thead id="thead">
                    <tr>
                        <th style="width:40px"></th>
                        <th data-k="rank">Rank</th>
                        <th data-k="ticker">Ticker</th>
                        <th data-k="company">Company</th>
                        <th data-k="country">Country</th>
                        <th data-k="ai_score">AI</th>
                        <th data-k="change">vs Open</th>
                        <th data-k="fundamental">Fund</th>
                        <th data-k="technical">Tech</th>
                        <th data-k="sentiment">Sent</th>
                        <th data-k="low_risk">Risk</th>
                        <th data-k="volume_millions">Vol (M)</th>
                        <th data-k="industry">Industry</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </main>
    <script>
        let state = { rows: [], as_of: null, universe: "" }, schedTimes = [[8, 45], [12, 30], [15, 35]], sortKey = "rank", sortDir = "asc", sectors = new Set(), favorites = new Set(JSON.parse(localStorage.getItem('favTickers') || '[]')), showFavsOnly = false;
        function saveFavorites() { localStorage.setItem('favTickers', JSON.stringify([...favorites])) }
        function toggleFav(ticker) { if (favorites.has(ticker)) favorites.delete(ticker); else favorites.add(ticker); saveFavorites(); applySearch() }
        function aiPillClass(s) { return s >= 9 ? 'pill-high' : s >= 7 ? 'pill-med' : 'pill-low' }
        function chgIndicator(val) { const n = Number(val); if (isNaN(n) || n === 0) return '<span class="chg-flat">â€”</span>'; if (n > 0) return <span class="chg-up"><svg width="12" height="12" viewBox="0 0 10 10"><polygon points="5,1 9,9 1,9" fill="#22c55e" /></svg>${n}</span>; return <span class="chg-down"><svg width="12" height="12" viewBox="0 0 10 10"><polygon points="5,9 9,1 1,1" fill="#f87171" /></svg>${Math.abs(n)}</span>; }
        function updateNextRun() {
  const now = new Date();
  const cst = new Date(now.toLocaleString('en-US', { timeZone: 'America/Chicago' }));
  const h = cst.getHours();
  const m = cst.getMinutes();
  const cur = h * 60 + m;
  let next = null;
  for (const [th, tm] of schedTimes) {
    const t = th * 60 + tm;
    if (t > cur) { next = [th, tm]; break; }
  }
  if (!next) next = [8, 45]; // after last run today â†’ first run tomorrow
  const nh = next[0];
  const nm = next[1];
  const nextMin = nh * 60 + nm;
  const diff = nextMin > cur ? nextMin - cur : (1440 - cur + nextMin);
  const hrs = Math.floor(diff / 60);
  const mins = diff % 60;
  const el = document.getElementById('nextRun');
  if (el) {
    el.textContent =
      `Next run: ${hrs}h ${mins}m (${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')} CST)`;
  }
}
        async function loadData() { try { const url = "./data/rankings.json?cb=" + Date.now(), r = await fetch(url, { cache: "no-store" }); if (!r.ok) throw new Error("HTTP " + r.status); const d = await r.json(); state = d; document.getElementById("errMsg").textContent = ""; document.getElementById("updated").textContent = "Last Updated: " + (d.as_of || "â€”"); sectors.clear(); (d.rows || []).forEach(r => r.sector && sectors.add(r.sector)); const sf = document.getElementById('sectorFilter'), cur = sf.value; sf.innerHTML = '<option value="">All Sectors</option>' + [...sectors].sort().map(s => <option value="${s}">${s}</option>).join(''); sf.value = cur; updateNextRun(); applySearch() } catch (e) { document.getElementById("errMsg").textContent = "Error loading data: " + e.message } }
        function render(rows) { const tb = document.getElementById("tbody"); tb.innerHTML = rows.map(r => <tr class="${favorites.has(r.ticker)?'favorited':''}"> <td><button class="star-btn ${favorites.has(r.ticker)?'active':''}" data-ticker="${r.ticker}">â˜…</button></td> <td>${r.rank ?? ""}</td> <td><strong>${r.ticker ?? ""}</strong></td> <td>${r.company ?? ""}</td> <td>${r.country ?? ""}</td> <td><span class="pill ${aiPillClass(r.ai_score)}">${r.ai_score ?? ""}</span></td> <td>${chgIndicator(r.change)}</td> <td>${r.fundamental ?? ""}</td> <td>${r.technical ?? ""}</td> <td>${r.sentiment ?? ""}</td> <td>${r.low_risk ?? ""}</td> <td>${r.volume_millions ?? ""}</td> <td>${r.industry ?? ""}</td> </tr>).join(""); const n = rows.length, aiHigh = rows.filter(x => Number(x.ai_score) >= 9).length, avg = k => n ? (rows.reduce((a, b) => a + (Number(b[k]) || 0), 0) / n).toFixed(2) : "0.00"; document.getElementById("kpiRows").textContent = n; document.getElementById("kpiTop").textContent = aiHigh; document.getElementById("kpiTech").textContent = avg("technical"); document.getElementById("kpiFavs").textContent = favorites.size; document.querySelectorAll('.star-btn').forEach(btn => btn.addEventListener('click', e => { e.stopPropagation(); toggleFav(e.target.dataset.ticker) })) }
        function applySearch() {
            const q = document.getElementById("search").value.trim().toLowerCase(), sec = document.getElementById('sectorFilter').value; let rows = state.rows || []; if (showFavsOnly) rows = rows.filter(r => favorites.has(r.ticker)); if (q) rows = rows.filter(r => (r.ticker || "").toLowerCase().includes(q) || (r.company || "").toLowerCase().includes(q)); if (sec) rows = rows.filter(r => (r.sector || "") == sec); rows = rows.slice().sort((a, b) => {
                const aFav = favorites.has(a.ticker) ? 1 : 0, bFav = favorites.has(b.ticker) ? 1 : 0; if (aFav !== bFav) return bFav - aFav; const av = a[sortKey], bv = b[sortKey], na = Number(av), nb = Number(bv), va = isNaN(na) ? (av || a= isNaN(na) ? (av ||
const tasks = [{ title: 'Market Risk Monitor', schedule: 'Weekdays @ 9:00 AM', nextRun: getNextWeekday(9, 0), status: 'active' }, { title: 'Politician Stock Trades', schedule: 'Weekly Sun @ 5:54 PM', nextRun: getNextDayOfWeek(0, 17, 54), status: 'active' }, { title: 'Weekly Economic Events', schedule: 'Weekly Sun @ 7:20 PM', nextRun: getNextDayOfWeek(0, 19, 20), status: 'active' }, { title: 'Value & Momentum Screen', schedule: 'Weekly Tue @ 10:00 AM', nextRun: getNextDayOfWeek(2, 10, 0), status: 'active' }, { title: 'Top Options Convictions', schedule: 'Weekdays @ 10:00 AM', nextRun: getNextWeekday(10, 0), status: 'active' }]; function getNextWeekday(h, m) { const now = new Date(), d = new Date(now); d.setHours(h, m, 0, 0); if (d <= now || d.getDay() === 0 || d.getDay() === 6) { d.setDate(d.getDate() + 1); while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1); d.setHours(h, m, 0, 0) } return d } function getNextDayOfWeek(dow, h, m) { const now = new Date(), d = new Date(now); d.setHours(h, m, 0, 0); const diff = (dow - d.getDay() + 7) % 7 || 7; d.setDate(d.getDate() + diff); d.setHours(h, m, 0, 0); return d } function formatDT(dt) { if (!dt) return '<span style="color:var(--muted)">â€”</span>'; return dt.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }) } function renderTasks() { const tb = document.getElementById('tasksTbody'); if (!tb) return; tif(typeof tasks === 'undefined' || !tasks || !tasks.length)return; b.innerHTML = tasks.map((t, i) => { const lastRun = localStorage.getItem('task_last_' + t.title); const lastDt = lastRun ? new Date(lastRun) : null; const statusPill = `<span class="pill pill-${t.status === 'active' ? 'high' : 'low'}" style="font-size:11px">${t.status}</span>`; return `<tr><td>${i + 1}</td><td style="font-weight:600;font-size:13px">${t.title}</td><td style="font-size:12px;color:var(--muted)">${t.schedule}</td><td style="font-size:12px">${formatDT(lastDt)}</td><td style="font-size:12px;color:#22c55e">${formatDT(t.nextRun)}</td><td>${statusPill}</td></tr>` }).join('') } renderTasks(); loadData();
