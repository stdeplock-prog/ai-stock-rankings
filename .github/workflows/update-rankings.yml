name: Update Stock Rankings

on:
  schedule:
        # Twin UTC crons + a TZ-aware gate (see first step in update-rankings job).
    # OS handles DST via TZ=America/Chicago, so YAML never needs DST edits.
    # Each pair fires twice; the gate exits 78 (neutral) on the off-target twin.
    - cron: '45 13,14 * * 1-5'   # 8:45 AM America/Chicago  (13:45 UTC CDT / 14:45 UTC CST)
    - cron: '30 17,18 * * 1-5'   # 12:30 PM America/Chicago (17:30 UTC CDT / 18:30 UTC CST)
    - cron: '35 20,21 * * 1-5'   # 3:35 PM America/Chicago  (20:35 UTC CDT / 21:35 UTC CST)
  workflow_dispatch:           # Manual trigger from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-rankings-main
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------
  # JOB 1: Run the data pipeline and push rankings.json
  # -------------------------------------------------------
  update-rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Gate on America/Chicago wall-clock time (DST-proof)
        if: github.event_name == 'schedule'
        run: |
          LOCAL_HM=$(TZ=America/Chicago date +%H:%M)
          LOCAL_DOW=$(TZ=America/Chicago date +%u)   # 1=Mon..7=Sun
          echo "Chicago local time: $LOCAL_HM (dow=$LOCAL_DOW)"
          if [ "$LOCAL_DOW" -gt 5 ]; then
            echo "Weekend in Chicago - skipping (neutral exit)."
            exit 78
          fi
          case "$LOCAL_HM" in
            08:45|12:30|15:35)
              echo "On-target slot ($LOCAL_HM) - proceeding."
              ;;
            *)
              echo "Off-target UTC twin ($LOCAL_HM) - skipping (neutral exit)."
              exit 78
              ;;
          esac

      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy requests yfinance scipy ta scikit-learn python-dotenv openpyxl lxml

      - name: Create required data directories
        run: |
          mkdir -p data/reference
          mkdir -p data/raw/ohlcv_daily
          mkdir -p data/processed/technical_indicators
          mkdir -p data/processed/scoring_outputs

      - name: Build universe (S&P 500 + Nasdaq 100)
        run: python 02_Code/Python/Data_Fetch/build_universe.py

      - name: Fetch OHLCV + fundamentals
        run: python 02_Code/Python/Data_Fetch/fetch_ohlcv.py
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}

      - name: Calculate technical indicators
        run: python 02_Code/Python/Indicators/calc_indicators.py

      - name: Score tickers
        run: python 02_Code/Python/Scoring_Engine/score_tickers.py

      - name: Fetch catalysts (earnings + analyst ratings)
        run: python 02_Code/Python/Data_Fetch/fetch_catalysts.py
        env:
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}

      - name: Score swing (SwingScore + tiers)
        run: python 02_Code/Python/Scoring_Engine/score_swing.py

      - name: Export rankings to JSON
        run: python 02_Code/Python/Scoring_Engine/export_to_json.py

      - name: Commit and push updated data files
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rankings.json
          git add data/processed/scoring_outputs/rankings_daily_open.csv 2>/dev/null || true
          git add data/processed/scoring_outputs/rankings_daily_open_date.txt 2>/dev/null || true
          git add data/processed/catalysts.csv 2>/dev/null || true
          git add data/processed/scoring_outputs/swing_rankings.csv 2>/dev/null || true
          git add data/reference/master_universe.csv 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[auto] Update rankings $(date -u '+%Y-%m-%d %H:%M') UTC"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main

  # -------------------------------------------------------
  # JOB 2: Deploy site to GitHub Pages (runs after Job 1)
  # -------------------------------------------------------
  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: update-rankings
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo (with fresh data)
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
